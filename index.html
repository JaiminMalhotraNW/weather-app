<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="A real-time weather application displaying current conditions and forecasts for any city.">
  <meta name="author" content="Jaimin Malhotra">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fdfdfc">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#181a18">

  <title>Weather App</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌤️</text></svg>">

  <script>
    (function() {
      try {
        var storedTheme = localStorage.getItem('weather-app-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (storedTheme === 'dark' || (!storedTheme && prefersDark)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="header-top">
        <div class="brand">
          <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 2v2"></path>
            <path d="M12 20v2"></path>
            <path d="M4.93 4.93l1.41 1.41"></path>
            <path d="M17.66 17.66l1.41 1.41"></path>
            <path d="M2 12h2"></path>
            <path d="M20 12h2"></path>
            <path d="M4.93 19.07l1.41-1.41"></path>
            <path d="M17.66 6.34l1.41-1.41"></path>
            <circle cx="12" cy="12" r="4"></circle>
          </svg>
          <h1 class="brand-title">Weather App</h1>
        </div>

        <button class="theme-toggle" type="button" id="theme-toggle" aria-label="Switch to dark mode" aria-pressed="false">
          <svg class="icon icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"></circle>
            <path d="M12 1v2"></path>
            <path d="M12 21v2"></path>
            <path d="M4.22 4.22l1.42 1.42"></path>
            <path d="M18.36 18.36l1.42 1.42"></path>
            <path d="M1 12h2"></path>
            <path d="M21 12h2"></path>
            <path d="M4.22 19.78l1.42-1.42"></path>
            <path d="M18.36 5.64l1.42-1.42"></path>
          </svg>
          <svg class="icon icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>

      <nav class="site-nav" aria-label="Primary navigation">
        <ul class="nav-list">
          <li class="nav-item">
            <a class="nav-link nav-link--active" href="#" aria-current="page">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Map</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Education</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Historical</a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="site-main" id="main-content">
      <section class="search-section" aria-label="City search">
        <form class="search-form" id="search-form" novalidate>
          <div class="search-container">
            <label class="visually-hidden" for="city-search">Search for a city or meteorological station</label>
            <input
              class="search-input"
              type="search"
              id="city-search"
              name="city"
              placeholder="Search for a city or meteorological station..."
              autocomplete="off"
              required
            >
            <button class="search-button" type="submit" id="search-button">
              <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
              <span>Search</span>
            </button>
          </div>
        </form>

        <div class="loading-container is-hidden" id="loading-container" role="status" aria-live="polite" aria-busy="false">
          <div class="spinner" aria-hidden="true"></div>
          <p class="loading-text">Fetching weather data…</p>
        </div>

        <div class="error-banner is-hidden" id="error-banner" role="alert" aria-live="assertive">
          <svg class="error-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 8v4"></path>
            <path d="M12 16h.01"></path>
          </svg>
          <p class="error-message" id="error-message"></p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <nav class="footer-nav" aria-label="Footer navigation">
        <ul class="footer-list">
          <li class="footer-item">
            <a class="footer-link" href="#">Privacy Policy</a>
          </li>
          <li class="footer-item">
            <a class="footer-link" href="#">Terms of Service</a>
          </li>
          <li class="footer-item">
            <a class="footer-link" href="#">Scientific Data Sources</a>
          </li>
        </ul>
      </nav>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
